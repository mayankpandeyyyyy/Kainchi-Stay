<!DOCTYPE html>
<html>
<body>
    <h2>Test Room Image Upload</h2>
    <form id="uploadForm">
        <input type="file" id="imageInput" name="images" accept="image/*" required>
        <button type="submit">Upload to Cloudinary</button>
    </form>
    <p id="status"></p>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Uploading... please wait.";

            const formData = new FormData();
            const fileInput = document.getElementById('imageInput');
            formData.append('images', fileInput.files[0]);

            try {
                const response = await fetch('http://localhost:5000/api/rooms/upload-image', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                status.innerText = JSON.stringify(result, null, 2);
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        };
    </script>
</body>
</html>
